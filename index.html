<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Chicken Game</title>
</head>

<body>

<h2>Hello World!!</h2>

<button onclick="addScore()">押して</button>

<p>score: <span id="score">0</span></p>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.0.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCiLNuZIWvqpcLbBxuH7KXTxrXPPAgRCho",
  authDomain: "chickin-game.firebaseapp.com",
  projectId: "chickin-game",
  storageBucket: "chickin-game.firebasestorage.app",
  messagingSenderId: "1037683320121",
  appId: "1:1037683320121:web:021e1f6b9f16e73949b4e8"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// スコア
window.score = 0;

// スコア増やす
window.addScore = function() {
  window.score += 1;
  document.getElementById("score").innerText = window.score;

  saveScore(window.score);
};

// 保存
window.saveScore = async function(score){
  await setDoc(doc(db, "scores", "player1"), {
    score: score
  });
};

// 読み込み（復元）
window.loadScore = async function(){
  const docSnap = await getDoc(doc(db, "scores", "player1"));

  if (docSnap.exists()) {
    window.score = docSnap.data().score;
    document.getElementById("score").innerText = window.score;
  }
};

// 起動時ロード
window.addEventListener("load", loadScore);

</script>

</body>
</html>
